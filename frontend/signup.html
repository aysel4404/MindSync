<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join MindSync - Create Account</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0B0E;
        }
        h1, h2, h3, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(0.95); opacity: 0.2; }
        }
        .glow-effect {
            animation: pulse-ring 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-squishy {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-slate-100 flex items-center justify-center min-h-screen p-4 select-none">

    <div class="w-full max-w-md bg-[#14171F] border border-slate-800/80 rounded-3xl p-6 md:p-8 shadow-2xl space-y-6 relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none glow-effect"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-purple-500/10 rounded-full blur-3xl pointer-events-none glow-effect"></div>

        <div class="text-center space-y-3 z-10 relative">
            <div class="flex flex-col items-center justify-center mb-1">
                <div class="w-16 h-16 rounded-[42%_58%_50%_50%_/_45%_45%_55%_55%] bg-gradient-to-b from-teal-200 to-pink-300 shadow-xl flex flex-col items-center justify-center relative border border-white/20 animate-squishy">
                   
                    <div class="absolute top-1 left-2.5 w-3 h-1.5 bg-white/40 rounded-full rotate-[-15deg]"></div>
                    <div class="absolute bottom-4 left-1.5 w-2 h-1 bg-pink-400/50 rounded-full blur-[0.2px]"></div>
                    <div class="absolute bottom-4 right-1.5 w-2 h-1 bg-pink-400/50 rounded-full blur-[0.2px]"></div>
                    <div class="flex items-center gap-2 mb-1.5 relative z-10">
                        <div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div>
                    </div>
                    <div class="w-2.5 h-1.5 border-b-2 border-slate-900 rounded-b-full"></div>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white">Create MindSync Hub</h1>
            <p class="text-xs text-slate-400 font-sans">Initialize stable mental analytics tracking for your developmental work.</p>
        </div>

        <form id="signupForm" class="space-y-4 z-10 relative" onsubmit="handleSignup(event)">
            
            <div class="space-y-1.5 font-sans">
                <label for="name" class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Full Name</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-user"></i></span>
                    <input type="text" id="name" required placeholder="John Doe" 
                           class="w-full bg-[#0A0B0E] border border-slate-800/60 rounded-2xl py-3.5 pl-11 pr-4 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 font-sans">
                <div class="col-span-1 space-y-1.5">
                    <label for="age" class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Age</label>
                    <input type="number" id="age" required min="12" max="120" placeholder="21" 
                           class="w-full bg-[#0A0B0E] border border-slate-800/60 rounded-2xl py-3.5 px-4 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                
                <div class="col-span-2 space-y-1.5">
                    <label for="email" class="text-[10px] font-bold uppercase tracking-wider text-slate-500">Email Address</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-envelope"></i></span>
                        <input type="email" id="email" required placeholder="name@domain.com" 
                               class="w-full bg-[#0A0B0E] border border-slate-800/60 rounded-2xl py-3.5 pl-11 pr-4 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors font-sans">
                    </div>
                </div>
            </div>

            <div class="space-y-1.5 font-sans">
                <label for="password" class="text-[10px] font-bold uppercase tracking-wider text-slate-500 font-sans">Security Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" required minlength="6" placeholder="••••••••" 
                           class="w-full bg-[#0A0B0E] border border-slate-800/60 rounded-2xl py-3.5 pl-11 pr-4 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors">
                </div>
                <p class="text-[10px] text-slate-500">Provide an alphanumeric sequence of 6+ keys.</p>
            </div>

            <button type="submit" id="btn-signup-submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-2xl transition shadow-lg shadow-indigo-600/10 cursor-pointer active:scale-[0.98] text-sm">
                Initialize Secure Database Sync
            </button>
        </form>

        <div class="text-center pt-4 border-t border-slate-800/50 z-10 relative">
            <p class="text-xs text-slate-400 font-sans">Already registered? <a href="/" class="text-indigo-400 hover:underline font-semibold">Trace credentials inside portal</a></p>
        </div>
    </div>

    <script>
        async function handleSignup(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('btn-signup-submit');
            submitBtn.textContent = 'Mapping cluster keys...';
            submitBtn.disabled = true;

            const nameInput = document.getElementById('name').value.trim();
            const ageInput = document.getElementById('age').value;
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: nameInput, 
                        age: ageInput, 
                        email: emailInput, 
                        password: passwordInput 
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Commit values directly into active memory caching slots
                    localStorage.setItem('user_full_name', nameInput);
                    localStorage.setItem('user_age', ageInput);
                    localStorage.setItem('user_email', emailInput);
                    
                    alert("🎉 Database mapping succeeded of profile parameters! Launching cockpit panel...");
                    
                    window.location.href = '/dashboard';
                } else {
                    alert("❌ Operation rejected: " + (data.message || "Invalid configuration parameters."));
                }
            } catch (err) {
                console.error("Networking connection fault:", err);
                alert("❌ Registry system broken: Could not establish line with validation route.");
            } finally {
                submitBtn.textContent = 'Initialize Secure Database Sync';
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
