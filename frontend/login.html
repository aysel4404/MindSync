<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindSync</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0B0E;
        }
        h1, h2, h3, .font-display {
            font-family: 'Space Grotesk', sans-serif;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.4; }
            100% { transform: scale(0.95); opacity: 0.2; }
        }
        .glow-effect {
            animation: pulse-ring 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-squishy {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="text-slate-100 flex items-center justify-center min-h-screen p-4 select-none">

    <div class="w-full max-w-md bg-[#14171F] border border-slate-800/80 rounded-3xl p-6 md:p-8 shadow-2xl space-y-6 relative overflow-hidden">
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none glow-effect"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-purple-500/10 rounded-full blur-3xl pointer-events-none glow-effect"></div>

        <div class="text-center space-y-3 z-10 relative">
            <div class="flex flex-col items-center justify-center mb-1">
                <div class="w-16 h-16 rounded-[42%_58%_50%_50%_/_45%_45%_55%_55%] bg-gradient-to-b from-teal-200 to-pink-300 shadow-xl flex flex-col items-center justify-center relative border border-white/20 animate-squishy">
                    
                    <div class="absolute top-1 left-2.5 w-3 h-1.5 bg-white/40 rounded-full rotate-[-15deg]"></div>
                    <div class="absolute bottom-4 left-1.5 w-2 h-1 bg-pink-400/50 rounded-full blur-[0.2px]"></div>
                    <div class="absolute bottom-4 right-1.5 w-2 h-1 bg-pink-400/50 rounded-full blur-[0.2px]"></div>
                    <div class="flex items-center gap-2 mb-1.5 relative z-10">
                        <div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div>
                        <div class="w-1.5 h-1.5 bg-slate-900 rounded-full"></div>
                    </div>
                    <div class="w-2.5 h-1.5 border-b-2 border-slate-900 rounded-b-full"></div>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white"> MindSync</h1>
            <p class="text-xs text-slate-400 font-sans">Your companion for mental clarity</p>
        </div>

        <form id="loginForm" class="space-y-4 z-10 relative" onsubmit="handleLogin(event)">
            <div class="space-y-1.5 font-sans">
                <label for="identifier" class="text-[10px] font-bold uppercase tracking-wider text-slate-500 font-sans">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-envelope"></i></span>
                    <input type="email" id="identifier" required placeholder="name@domain.com" 
                      class="w-full bg-[#0A0B0E] border border-slate-800/60 rounded-2xl py-3.5 pl-11 pr-4 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors font-sans">
                </div>
            </div>

            <div class="space-y-1.5 font-sans">
                <div class="flex items-center justify-between font-sans">
                    <label for="password" class="text-[10px] font-bold uppercase tracking-wider text-slate-500 font-sans">Password</label>
                    <a href="#" onclick="handleForgotPassword()" class="text-xs text-indigo-400 hover:underline font-semibold font-sans">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-500 text-sm"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" required placeholder="••••••••" 
                           class="w-full bg-[#0A0B0E] border border-slate-800/60 rounded-2xl py-3.5 pl-11 pr-4 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors font-sans">
                </div>
            </div>

            <button type="submit" id="btn-login-submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-2xl transition shadow-lg shadow-indigo-600/10 cursor-pointer active:scale-[0.98] text-sm font-sans">
                Login
            </button>
        </form>

        <div class="text-center pt-4 border-t border-slate-800/50 z-10 relative">
            <p class="text-xs text-slate-400 font-sans">New around here? <a href="/signup" class="text-indigo-400 hover:underline font-semibold font-sans">Sign Up</a></p>
        </div>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const submitBtn = document.getElementById('btn-login-submit');
            submitBtn.textContent = 'Synchronizing credentials...';
            submitBtn.disabled = true;
            
            const identifierInput = document.getElementById('identifier').value.trim();
            const passwordInput = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identifier: identifierInput, password: passwordInput })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                     
                    localStorage.setItem('user_full_name', data.user_full_name);
                    localStorage.setItem('user_email', data.user_email);
                    localStorage.setItem('user_age', data.user_age);
                    console.log(`👤 Secured active session: ${data.user_full_name}`);
                    
                    window.location.href = '/dashboard';
                } else {
                    alert("❌ Authentication failed: " + (data.message || "Invalid credentials."));
                }
            } catch (err) {
                console.error("Pipeline connection error:", err);
                alert("❌ Communication line disconnected: Could not reach backend cluster.");
            } finally {
                submitBtn.textContent = 'Connect Workspace Pipeline';
                submitBtn.disabled = false;
            }
        }

        function handleForgotPassword() {
            const id = document.getElementById('identifier').value;
            if(!id) {
                alert("Please write your email in the address bar so we can trace your configuration profile.");
            } else {
                alert(`📧 Reset code dispatched to: ${id} successfully! Please inspect spam folder if it doesn't arrive within 1 minute.`);
            }
        }
    </script>
</body>
</html>
